name: HospitalOS
version: 1.0.0
description: RL Environment for Indian Hospital Coordination
author: Palak-08-Gupta

environment:
  type: http
  base_url: https://palak-08-gupta-hospitalos.hf.space

endpoints:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state
  grade:
    method: GET
    path: /grade

action_space:
  patient_id: int
  action_type: str
  diagnosis: str

observation_space:
  patients: list
  resources: dict
  stats: dict
  step: int

reward:
  correct_diagnosis: +25
  patient_discharged: +15
  critical_treated_fast: +20
  wrong_diagnosis: -40
  patient_death: -50
  overcharging: -15

tags:
  - healthcare
  - india
  - hospital
  - coordination
  - rl-environment
